<!DOCTYPE html>
<!--
  PROTOTYPE — Speaker 概览重设计稿（可丢弃，不进产品）

  回答的问题：概览 Tab 怎样才"大气"？
  方案：去掉全部卡片框，按"个人年报"排版 —— 巨大的衬线体累计字数作主角，
  数字下方压一条取自真实数据的香槟色声纹（呼应录音 HUD 的身份）；
  说话时长 / 少敲的键盘 / 本周 退成一行安静的次级指标；
  最近一年（52 周）GitHub 风格热力图满宽铺底，无边框、无小标题、宽度响应式。
  香槟色 rgb(247,222,181) 是全页唯一强调色。

  运行：open docs/prototypes/overview-redesign-prototype.html
  响应式：拖拽窗口右下角改变尺寸
  空态：URL 加 ?empty

  设计内嵌的决策（待用户反应）：
  - 副行指标：保留"本周 +N 字"作第三指标；不做"连续 N 天"（成就味，已出圈）
  - 年度视图下说话时长只展示 时/分，不展示秒
  - 热力图档位沿用现有策略（0 / <400 / <900 / <1500 / ≥1500）

  SwiftUI 落地映射：
  - 衬线数字 = Font.system(size:, weight:, design: .serif)（New York），单位用 PingFang
  - 香槟色 = HUD 的 hudAccent；空格/分隔线 = Color.primary.opacity(...)
  - 窗口材质 = 原生窗口背景（本稿的渐变仅是 mock 氛围）
  - 数字滚动 = contentTransition(.numericText) 或 TimelineView 计数
  - 热力图从左到右扫入 = 按列 stagger opacity；Reduce Motion 时关闭
  - 响应式格子 = GeometryReader 按可用宽度求 cell/gap
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PROTOTYPE · Speaker 概览重设计</title>
<style>
  /* ── mock 氛围（非设计的一部分）── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang SC", sans-serif;
    background: linear-gradient(160deg, #2c3140 0%, #1b1e27 60%, #15161c 100%);
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
  }
  .aurora { position: absolute; inset: 0; pointer-events: none; }
  .aurora i {
    position: absolute; display: block; border-radius: 50%;
    filter: blur(56px); opacity: 0.3;
    animation: drift 16s ease-in-out infinite alternate;
  }
  .aurora i:nth-child(1) {
    width: 380px; height: 300px; left: 8%; top: 12%;
    background: radial-gradient(circle, #ff9d6c, transparent 70%);
  }
  .aurora i:nth-child(2) {
    width: 420px; height: 340px; right: 6%; bottom: 8%;
    background: radial-gradient(circle, #6c8cff, transparent 70%);
    animation-delay: -7s;
  }
  @keyframes drift {
    from { transform: translate(-24px, 0) scale(1); }
    to   { transform: translate(24px, 12px) scale(1.12); }
  }
  .hint {
    position: relative; font-size: 11px; color: rgba(255,255,255,0.35);
  }

  /* ── 设计 token ──
     墨    #1B1E25  窗口底（app 里是原生材质）
     纸    rgba(255,255,255,0.93)  主文字
     雾    rgba(255,255,255,0.5)   次文字
     石    rgba(255,255,255,0.07)  空格 / 发丝线
     香槟  #F7DEB5  唯一强调色（= HUD hudAccent），热力图按透明度分档 */
  :root {
    --paper: rgba(255,255,255,0.93);
    --mist: rgba(255,255,255,0.5);
    --stone: rgba(255,255,255,0.07);
    --champagne: 247, 222, 181;
    --serif: ui-serif, "New York", Georgia, serif;
  }

  /* ── 窗口 ── */
  .window {
    position: relative;
    width: min(960px, 94vw); height: min(680px, 86vh);
    min-width: 680px; min-height: 540px;
    resize: both; overflow: hidden;
    border-radius: 14px;
    background: linear-gradient(rgba(43,45,53,0.9), rgba(27,28,33,0.94));
    backdrop-filter: blur(40px) saturate(1.8);
    border: 0.5px solid rgba(255,255,255,0.14);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.16),
      0 30px 90px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
  }
  .titlebar {
    height: 48px; flex: none; display: flex; align-items: center;
    padding: 0 16px; gap: 8px;
  }
  .titlebar i { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .tabs {
    position: absolute; left: 50%; top: 9px; transform: translateX(-50%);
    display: flex; gap: 2px; padding: 3px;
    background: rgba(0,0,0,0.25); border-radius: 9px;
  }
  .tabs span {
    border-radius: 7px; padding: 5px 16px;
    color: rgba(255,255,255,0.4); font-size: 12.5px;
  }
  .tabs span.active {
    background: rgba(255,255,255,0.14); color: var(--paper);
  }

  /* ── 概览：年报排版，主角在上、图在底、无卡片框 ── */
  .content {
    flex: 1; min-height: 0;
    container-type: inline-size;
    display: flex; flex-direction: column;
    justify-content: space-between; /* 余量均匀分给 主角/指标/热力图 之间 */
    padding: 26px clamp(30px, 6cqw, 60px) 30px;
  }

  .eyebrow {
    font-size: 12px; letter-spacing: 3px;
    color: var(--mist);
  }
  .hero {
    margin-top: 16px;
    font-family: var(--serif);
    font-size: clamp(52px, 10cqw, 94px);
    font-weight: 600; line-height: 1.04;
    color: var(--paper);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }
  .hero .unit {
    font-family: -apple-system, "PingFang SC", sans-serif;
    font-size: 0.22em; font-weight: 600;
    color: var(--mist); margin-left: 10px; letter-spacing: 1px;
  }

  /* 签名元素：数字下的声纹 —— 最近 18 天的真实数据，香槟色 */
  .voiceprint {
    margin-top: 18px; height: 26px;
    display: flex; align-items: center; gap: 4px;
  }
  .voiceprint i {
    width: 5px; border-radius: 2.5px; display: block;
    background: rgb(var(--champagne));
    transform-origin: center;
    animation: rise 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.2) both;
    animation-delay: calc(var(--i) * 28ms + 200ms);
  }
  @keyframes rise { from { transform: scaleY(0.1); opacity: 0; } }
  .voiceprint i.mute { background: var(--stone); opacity: 1 !important; }
  .voiceprint.silent i { background: var(--stone); animation: none; }
  .invite {
    margin-top: 14px; font-size: 13px; color: var(--mist);
  }

  .metrics {
    margin-top: 42px;
    display: flex; align-items: flex-start;
    gap: clamp(28px, 5cqw, 56px);
  }
  .metric .value {
    font-family: var(--serif);
    font-size: 21px; font-weight: 600; color: var(--paper);
    font-variant-numeric: tabular-nums;
  }
  .metric .value small {
    font-family: -apple-system, "PingFang SC", sans-serif;
    font-size: 12px; font-weight: 600; color: var(--mist); margin: 0 1px;
  }
  .metric .label {
    margin-top: 5px; font-size: 11.5px; color: var(--mist);
    letter-spacing: 0.5px;
  }
  .metric + .metric {
    border-left: 0.5px solid rgba(255,255,255,0.12);
    padding-left: clamp(28px, 5cqw, 56px);
  }

  /* ── 热力图：满宽、响应式、无框无标题 ── */
  .heat { margin-top: 36px; }
  .heat-months {
    display: grid;
    grid-template-columns: repeat(52, 1fr);
    gap: var(--heat-gap, 3px);
    margin-bottom: 7px;
    font-size: 10px; color: rgba(255,255,255,0.35);
  }
  .heat-months span { grid-row: 1; white-space: nowrap; }
  .heatmap {
    display: grid;
    grid-auto-flow: column;
    grid-template-rows: repeat(7, auto);
    grid-template-columns: repeat(52, 1fr);
    gap: var(--heat-gap, 3px);
  }
  .heatmap i {
    aspect-ratio: 1; border-radius: 26%;
    background: var(--stone);
    animation: cellIn 0.24s ease-out both;
    animation-delay: calc(var(--c) * 7ms + 300ms);
  }
  @keyframes cellIn { from { opacity: 0; transform: scale(0.55); } }
  .heatmap i.l1 { background: rgba(var(--champagne), 0.24); }
  .heatmap i.l2 { background: rgba(var(--champagne), 0.44); }
  .heatmap i.l3 { background: rgba(var(--champagne), 0.68); }
  .heatmap i.l4 { background: rgba(var(--champagne), 0.95); }
  .heatmap i.future { visibility: hidden; }
  .heat-legend {
    display: flex; align-items: center; justify-content: flex-end; gap: 3px;
    margin-top: 10px; font-size: 10.5px; color: rgba(255,255,255,0.4);
  }
  .heat-legend i { width: 10px; height: 10px; border-radius: 3px; display: block; }

  @media (prefers-reduced-motion: reduce) {
    .voiceprint i, .heatmap i { animation: none; }
    .aurora i { animation: none; }
  }
</style>
</head>
<body>

<div class="aurora"><i></i><i></i></div>

<div class="window">
  <div class="titlebar">
    <i style="background:#ff5f57"></i><i style="background:#febc2e"></i><i style="background:#28c840"></i>
    <div class="tabs">
      <span class="active">概览</span><span>历史</span><span>设置</span><span>词典</span>
    </div>
  </div>

  <div class="content">
    <header>
      <div class="eyebrow">说出的文字 · 累计</div>
      <div class="hero"><span id="heroNumber">0</span><span class="unit">字</span></div>
      <div class="voiceprint" id="voiceprint"></div>
      <div class="invite" id="invite" hidden>按住 Fn，说出第一句话。</div>
    </header>

    <div class="metrics">
      <div class="metric">
        <div class="value" id="mSpeak"></div>
        <div class="label">说话时长</div>
      </div>
      <div class="metric">
        <div class="value" id="mSaved"></div>
        <div class="label">少敲的键盘</div>
      </div>
      <div class="metric">
        <div class="value" id="mWeek"></div>
        <div class="label">本周</div>
      </div>
    </div>

    <div class="heat">
      <div class="heat-months" id="heatMonths"></div>
      <div class="heatmap" id="heatmap"></div>
      <div class="heat-legend">
        少 <i style="background:var(--stone)"></i><i
        style="background:rgba(var(--champagne),0.24)"></i><i
        style="background:rgba(var(--champagne),0.44)"></i><i
        style="background:rgba(var(--champagne),0.68)"></i><i
        style="background:rgba(var(--champagne),0.95)"></i> 多
      </div>
    </div>
  </div>
</div>

<p class="hint">拖拽窗口右下角体验响应式 · URL 加 ?empty 查看空态</p>

<script>
"use strict";
const EMPTY = new URLSearchParams(location.search).has("empty");
const WEEKS = 52;
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

/* 确定性假数据：工作日多、周末少，前两个月轻（刚上手），两段假期空档 */
function mulberry32(seed) {
  return () => {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rand = mulberry32(20260719);

const today = new Date(); today.setHours(0, 0, 0, 0);
const start = new Date(today);
/* 周一行首：起点 = 51 周前那一周的周一 */
start.setDate(start.getDate() - ((today.getDay() + 6) % 7) - (WEEKS - 1) * 7);

const vacations = [[100, 108], [231, 236]]; /* 相对起点的空档天数 */
const days = [];
for (let offset = 0; ; offset++) {
  const date = new Date(start);
  date.setDate(start.getDate() + offset);
  if (date > today) break;
  let words = 0;
  if (!EMPTY && !vacations.some(([a, b]) => offset >= a && offset <= b)) {
    const weekend = date.getDay() === 0 || date.getDay() === 6;
    const rampUp = Math.min(1, 0.25 + offset / 90); /* 前三个月渐入 */
    if (rand() >= (weekend ? 0.5 : 0.14)) {
      words = Math.floor((weekend ? 450 : 1150) * rampUp * (0.25 + rand() * 1.5));
    }
  }
  days.push({ date, words });
}

/* 主角与次级指标 */
const total = days.reduce((sum, day) => sum + day.words, 0);
const weekTotal = days.slice(-7).reduce((sum, day) => sum + day.words, 0);
const speakMinutes = Math.round(total / 220);   /* ≈220 字/分钟的语速 */
const savedHours = total / 14400;               /* 现有换算：240 字/分钟打字 */

const hero = document.getElementById("heroNumber");
function setHero(value) { hero.textContent = value.toLocaleString(); }
if (reduceMotion || EMPTY) {
  setHero(total);
} else {
  const t0 = performance.now(), duration = 700;
  (function tick(now) {
    const progress = Math.min(1, (now - t0) / duration);
    setHero(Math.round(total * (1 - Math.pow(1 - progress, 3))));
    if (progress < 1) requestAnimationFrame(tick);
  })(t0);
}

document.getElementById("mSpeak").innerHTML = EMPTY
  ? `0<small>分</small>`
  : `${Math.floor(speakMinutes / 60)}<small>时</small>${speakMinutes % 60}<small>分</small>`;
document.getElementById("mSaved").innerHTML =
  `约 ${savedHours.toFixed(1)}<small>小时</small>`;
document.getElementById("mWeek").innerHTML =
  `${weekTotal ? "+" : ""}${weekTotal.toLocaleString()}<small>字</small>`;

/* 签名声纹：最近 18 天 */
const voiceprint = document.getElementById("voiceprint");
if (EMPTY) {
  voiceprint.classList.add("silent");
  document.getElementById("invite").hidden = false;
}
const recent = days.slice(-18);
const peak = Math.max(1, ...recent.map(day => day.words));
recent.forEach((day, index) => {
  const bar = document.createElement("i");
  bar.style.setProperty("--i", index);
  bar.style.height = `${6 + 18 * Math.pow(day.words / peak, 0.7)}px`;
  if (day.words === 0) {
    bar.classList.add("mute"); /* 静音日：石色短棒 */
  } else {
    bar.style.opacity = `${0.55 + 0.45 * (day.words / peak)}`;
  }
  voiceprint.appendChild(bar);
});

/* 热力图：52 周、列 = 周（周一行首）、今天在最后一列；档位 400/900/1500 */
const grid = document.getElementById("heatmap");
const months = document.getElementById("heatMonths");
let lastMonth = -1, lastLabelColumn = -4;
for (let w = 0; w < WEEKS; w++) {
  for (let d = 0; d < 7; d++) {
    const day = days[w * 7 + d];
    const cell = document.createElement("i");
    cell.style.setProperty("--c", w);
    if (!day) {
      cell.className = "future";
    } else {
      const words = day.words;
      const level = words === 0 ? 0 : words < 400 ? 1 : words < 900 ? 2
        : words < 1500 ? 3 : 4;
      if (level) cell.className = "l" + level;
      cell.title = `${day.date.getMonth() + 1}月${day.date.getDate()}日 · ${
        words ? words.toLocaleString() + " 字" : "无记录"}`;
      if (d === 0 && day.date.getMonth() !== lastMonth) {
        lastMonth = day.date.getMonth();
        if (w - lastLabelColumn >= 4) { /* 标签之间留呼吸 */
          const label = document.createElement("span");
          label.textContent = `${lastMonth + 1}月`;
          label.style.gridColumn = `${w + 1} / span 4`;
          months.appendChild(label);
          lastLabelColumn = w;
        }
      }
    }
    grid.appendChild(cell);
  }
}
</script>
</body>
</html>
